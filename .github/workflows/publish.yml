name: Publish Package

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-and-publish:
    name: Build and publish Python distribution
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 2.1.2
        virtualenvs-create: true
        virtualenvs-in-project: true
        
    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v4
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
        
    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-root
      
    - name: Install project
      run: poetry install --no-interaction
      
    - name: Run tests
      run: |
        poetry run pytest tests/ -v || echo "No tests found, skipping..."
        
    - name: Build package
      run: poetry build
      
    - name: Check package
      run: |
        poetry run pip install twine
        poetry run twine check dist/*
    
    - name: Determine target repository
      id: repo
      run: |
        if [[ "${{ github.event_name }}" == "release" ]]; then
          echo "repository=pypi" >> $GITHUB_OUTPUT
          echo "name=PyPI" >> $GITHUB_OUTPUT
        else
          echo "repository=testpypi" >> $GITHUB_OUTPUT
          echo "name=TestPyPI" >> $GITHUB_OUTPUT
        fi
    
    - name: Configure TestPyPI repository
      if: steps.repo.outputs.repository == 'testpypi'
      run: |
        poetry config repositories.testpypi https://test.pypi.org/legacy/
        
    - name: Publish to ${{ steps.repo.outputs.name }}
      env:
        POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_API_TOKEN }}
        POETRY_PYPI_TOKEN_TESTPYPI: ${{ secrets.TEST_PYPI_API_TOKEN }}
      run: |
        if [[ "${{ steps.repo.outputs.repository }}" == "testpypi" ]]; then
          poetry publish --repository testpypi --no-interaction
        else
          poetry publish --no-interaction
        fi
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ github.sha }}
        path: dist/
